<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOS Alive'26</title>

    <style>
        :root {
            --bg-main: #0a0f18;
            --bg-soft: #131a26;
            --card-bg: #1a2232;
            --card-border: #2b3a55;
            --text-main: #f4f7ff;
            --text-soft: #c5d0e6;
            --accent: rgb(209, 74, 150);
        }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, var(--bg-soft) 0%, var(--bg-main) 55%);
            color: var(--text-main);
        }

        header {
            display:flex; 
            align-items:center; 
            justify-content:space-between;  
            background: var(--accent);
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: black;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
            transition: opacity 0.2s ease;
        }

        nav a:hover {
            opacity: 0.75;
        }

        main {
            padding: 40px;
            max-width: 980px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            border-radius: 10px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.34);
        }

        .card a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.2rem;
        }

        .card a:hover {
            color: #ffd5ef;
        }

        .btn {
            display: inline-block;
            width: fit-content;
            padding: 8px 14px;
            border-radius: 6px;
            border: 0;
            background: var(--accent);
            color: #101010;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.12s ease, opacity 0.12s ease;
        }

        .btn:hover {
            color: #101010;
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .card a.btn {
            font-size: 0.95rem;
            color: #101010;
        }

        p {
            color: var(--text-soft);
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--card-border);
            font-size: 0.9rem;
            color: #aaa;
        }

        input, select {
            padding: 7px 10px;
            border-radius: 4px;
            border: 1px solid var(--card-border);
            background: #f8f8f8;
        }
    </style>
</head>
<body>

    <header>
        {% load static %}
        <img src="{% static 'festival/NA26.png' %}" alt="NOS Alive" style="height: 150px; vertical-align: middle; margin-right: 15px;">
        <nav>
            <a href="{% url 'index' %}">Início</a>
            <a href="{% url 'dias' %}">Dias</a>
            <a href="{% url 'palcos' %}">Palcos</a>
            <a href="{% url 'criar_concerto' %}">Criar concerto</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>Feel the sound. Live the night.</p>
    </footer>

</body>
</html>
